# Configuration Nixpacks pour Railway — PHP 8.4 requis (Symfony 8.x)
[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci --prefer-offline"
]

[phases.build]
cmds = [
    "npm run build",
    "chmod -R 775 storage bootstrap/cache"
]

[start]
cmd = "bash start.sh"
